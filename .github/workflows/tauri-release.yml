name: Build & Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web/src-tauri -> target

      - name: Install dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies (Windows)
        if: matrix.target == 'windows'
        run: |
          choco install nsis --yes

      - name: Install frontend dependencies
        run: bun install

      - name: Security audit (dependencies)
        if: matrix.target == 'linux'
        run: bun audit

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web
          tagName: ${{ github.ref_name }}
          releaseName: 'NeuroDual ${{ github.ref_name }}'
          releaseBody: |
            ## NeuroDual Desktop ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier |
            |------------|---------|
            | Windows | `NeuroDual_*_x64-setup.exe` (recommandé) ou `.msi` |
            | macOS | `NeuroDual_*.dmg` |
            | Linux (Debian/Ubuntu) | `NeuroDual_*_amd64.deb` |
            | Linux (Fedora) | `NeuroDual_*.rpm` |
            | Linux (Portable) | `NeuroDual_*.AppImage` |

            ---
            Entraînement cérébral Dual N-Back
          releaseDraft: true
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            apps/web/src-tauri/target/release/bundle/**/*.exe
            apps/web/src-tauri/target/release/bundle/**/*.msi
            apps/web/src-tauri/target/release/bundle/**/*.dmg
            apps/web/src-tauri/target/release/bundle/**/*.deb
            apps/web/src-tauri/target/release/bundle/**/*.rpm
            apps/web/src-tauri/target/release/bundle/**/*.AppImage
          retention-days: 7

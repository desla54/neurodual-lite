<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeuroDual Adaptive Icon Foreground
  Grille 3x3 Brain Training avec fond weave discret - Trait focus amber
-->
<svg width="432" height="432" viewBox="0 0 108 108" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pattern weave discret -->
    <pattern id="weave-pattern" width="12" height="12" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="12" y2="6" stroke="#1A1815" stroke-width="0.2" opacity="0.06"/>
      <line x1="6" y1="0" x2="6" y2="12" stroke="#1A1815" stroke-width="0.2" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Fond weave -->
  <rect width="108" height="108" fill="#FAFAF8"/>
  <rect width="108" height="108" fill="url(#weave-pattern)"/>

  <!-- Grille 3x3 centrée -->
  <g transform="translate(30, 30)">
    <!-- Case active (haut-gauche) -->
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#1A1815"/>

    <!-- Case inactive (haut-centre) -->
    <rect x="17" y="0" width="14" height="14" rx="3" stroke="#1A1815" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Case inactive (haut-droite) -->
    <rect x="34" y="0" width="14" height="14" rx="3" stroke="#1A1815" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Case inactive (milieu-gauche) -->
    <rect x="0" y="17" width="14" height="14" rx="3" stroke="#1A1815" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Trait focus central - amber -->
    <line x1="21" y1="24" x2="27" y2="24" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Case inactive (milieu-droite) -->
    <rect x="34" y="17" width="14" height="14" rx="3" stroke="#1A1815" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Case inactive (bas-gauche) -->
    <rect x="0" y="34" width="14" height="14" rx="3" stroke="#1A1815" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Case inactive (bas-centre) -->
    <rect x="17" y="34" width="14" height="14" rx="3" stroke="#1A1815" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Case active (bas-droite) -->
    <rect x="34" y="34" width="14" height="14" rx="3" fill="#1A1815"/>
  </g>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeuroDual Splash Screen
  Grille 3x3 Brain Training centrée sur fond clair (sans cercle)
  Traits épaissis pour rester nets après redimensionnement
-->
<svg width="2732" height="2732" viewBox="0 0 2732 2732" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond clair (Woven Paper) -->
  <rect width="2732" height="2732" fill="#F8F7F4"/>

  <!-- Grille 3x3 centrée -->
  <!-- cellSize: 120, gap: 26, total: 120*3 + 26*2 = 412 -->
  <!-- Position: (2732-412)/2 = 1160 -->
  <g transform="translate(1160, 1160)">
    <!-- Rangée 1 -->
    <rect x="0" y="0" width="120" height="120" rx="24" fill="#1A1815"/>
    <rect x="146" y="0" width="120" height="120" rx="24" stroke="#1A1815" stroke-width="8" fill="none" opacity="0.35"/>
    <rect x="292" y="0" width="120" height="120" rx="24" stroke="#1A1815" stroke-width="8" fill="none" opacity="0.35"/>

    <!-- Rangée 2 -->
    <rect x="0" y="146" width="120" height="120" rx="24" stroke="#1A1815" stroke-width="8" fill="none" opacity="0.35"/>
    <!-- Trait focus central - amber -->
    <line x1="176" y1="206" x2="236" y2="206" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
    <rect x="292" y="146" width="120" height="120" rx="24" stroke="#1A1815" stroke-width="8" fill="none" opacity="0.35"/>

    <!-- Rangée 3 -->
    <rect x="0" y="292" width="120" height="120" rx="24" stroke="#1A1815" stroke-width="8" fill="none" opacity="0.35"/>
    <rect x="146" y="292" width="120" height="120" rx="24" stroke="#1A1815" stroke-width="8" fill="none" opacity="0.35"/>
    <rect x="292" y="292" width="120" height="120" rx="24" fill="#1A1815"/>
  </g>
</svg>

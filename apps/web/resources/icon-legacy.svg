<?xml version="1.0" encoding="UTF-8"?>
<!--
  NeuroDual Launcher Icon (Legacy - pre-Android 8)
  Grille 3x3 Brain Training avec fond et coins arrondis
  Marges confortables pour tous les masques
-->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond Woven Paper avec coin arrondi -->
  <rect width="512" height="512" rx="90" fill="#F8F7F4"/>

  <!-- Grille 3x3 centrée avec marges -->
  <!-- cellSize: 70, gap: 15, total: 70*3 + 15*2 = 240 -->
  <!-- Position: (512-240)/2 = 136 -->
  <g transform="translate(136, 136)">
    <!-- Rangée 1 -->
    <rect x="0" y="0" width="70" height="70" rx="14" fill="#1A1815"/>
    <rect x="85" y="0" width="70" height="70" rx="14" stroke="#1A1815" stroke-width="4" fill="none" opacity="0.35"/>
    <rect x="170" y="0" width="70" height="70" rx="14" stroke="#1A1815" stroke-width="4" fill="none" opacity="0.35"/>

    <!-- Rangée 2 -->
    <rect x="0" y="85" width="70" height="70" rx="14" stroke="#1A1815" stroke-width="4" fill="none" opacity="0.35"/>
    <!-- Trait focus central -->
    <line x1="100" y1="120" x2="140" y2="120" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <rect x="170" y="85" width="70" height="70" rx="14" stroke="#1A1815" stroke-width="4" fill="none" opacity="0.35"/>

    <!-- Rangée 3 -->
    <rect x="0" y="170" width="70" height="70" rx="14" stroke="#1A1815" stroke-width="4" fill="none" opacity="0.35"/>
    <rect x="85" y="170" width="70" height="70" rx="14" stroke="#1A1815" stroke-width="4" fill="none" opacity="0.35"/>
    <rect x="170" y="170" width="70" height="70" rx="14" fill="#1A1815"/>
  </g>
</svg>

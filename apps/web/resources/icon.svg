<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pattern weave plus discret -->
    <pattern id="weave-pattern" width="12" height="12" patternUnits="userSpaceOnUse">
      <line x1="0" y1="6" x2="12" y2="6" stroke="#1A1815" stroke-width="0.2" opacity="0.06"/>
      <line x1="6" y1="0" x2="6" y2="12" stroke="#1A1815" stroke-width="0.2" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Fond weave -->
  <rect width="100" height="100" fill="#FAFAF8"/>
  <rect width="100" height="100" fill="url(#weave-pattern)"/>

  <!-- Grille 3x3 centrée -->
  <g transform="translate(23, 23)">
    <!-- Case 0,0 - active (remplie) -->
    <rect x="0" y="0" width="16" height="16" rx="4" fill="#1A1815"/>

    <!-- Case 1,0 - inactive -->
    <rect x="19" y="0" width="16" height="16" rx="4" stroke="#1A1815" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Case 2,0 - inactive -->
    <rect x="38" y="0" width="16" height="16" rx="4" stroke="#1A1815" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Case 0,1 - inactive -->
    <rect x="0" y="19" width="16" height="16" rx="4" stroke="#1A1815" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Case 2,1 - inactive -->
    <rect x="38" y="19" width="16" height="16" rx="4" stroke="#1A1815" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Case 0,2 - inactive -->
    <rect x="0" y="38" width="16" height="16" rx="4" stroke="#1A1815" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Case 1,2 - inactive -->
    <rect x="19" y="38" width="16" height="16" rx="4" stroke="#1A1815" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Case 2,2 - active (remplie) -->
    <rect x="38" y="38" width="16" height="16" rx="4" fill="#1A1815"/>

    <!-- Trait focus central - amber -->
    <line x1="24" y1="27" x2="30" y2="27" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>

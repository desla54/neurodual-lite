    <meta name="twitter:image" content="/icon-512.png" />

    <title>Neurodual - Entraînement Cérébral Dual N-Back</title>

    <!-- Google AdSense (disabled at runtime in Capacitor native WebView via admob.ts guard) -->

     crossorigin="anonymous"></script>

    <!-- Schema.org Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Neurodual",
      "alternateName": "Neurodual - Dual N-Back Training",
      "description": "Application d'entraînement cérébral Dual N-Back avec modes originaux et simulateurs des protocoles classiques (Brain Workshop).",
      "url": "https://neurodual.com",
      "applicationCategory": ["HealthApplication", "EducationalApplication", "GameApplication"],
      "operatingSystem": ["Windows", "macOS", "Linux", "Android", "iOS"],
      "browserRequirements": "Requires JavaScript. Works best in Chrome, Edge, Firefox, or Safari.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "EUR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.5",
        "ratingCount": "1"
      },
      "author": {
        "@type": "Person",
        "name": "Neurodual Team"
      },
      "image": "https://neurodual.com/icon-512.png",
      "screenshot": "https://neurodual.com/icon-512.png",

      "datePublished": "2024-01-01",
      "inLanguage": ["fr", "en"]
    }

    <style>
      /* Critical CSS - prevent FOUC */
      /* Colors MUST match --neuro-bg-app in styles.css */
      html { background: #F0EEE9; }
      html.dark { background: #171512; }
      body { margin: 0; background: #F0EEE9; }
      html.dark body { background: #171512; }
      #root { height: 100%; }
      /* Splash / loading screen — GSAP animates it out when app is ready */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F0EEE9;
        z-index: 9998;
      }
      html.dark #app-loading { background: #171512; }
    </style>
    <!-- Module error handler - external to comply with CSP -->
    <script src="/module-error-handler.js"></script>
    <!-- React Scan - dev only, activated via ?react-scan query param -->
    <script>
      if (location.hostname === 'localhost' && location.search.includes('react-scan')) {
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/react-scan/dist/auto.global.js';
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <!-- Splash / loading screen — stays visible until appState reaches 'ready'.
         Dark/light theme set by theme-boot.js (adds html.dark class before paint). -->
    <div id="app-loading">
      <img src="/icon.svg" alt="" width="64" height="64" class="loading-icon" />
    </div>
    <div id="root" data-vaul-drawer-wrapper=""></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
